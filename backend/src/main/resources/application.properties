# Base Configuration (Common for all profiles)
spring.application.name=nugar-backend
server.port=8080

# Java 21 Virtual Threads (Project Loom) - maximizes throughput with low memory footprint
spring.threads.virtual.enabled=true

# Active Profile
spring.profiles.active=dev

# CORS Configuration
cors.allowed-origins=http://localhost:8081,http://localhost:8082,http://192.168.100.15:8081,http://192.168.100.15:8082

# Exclude Elasticsearch autoconfiguration (Manual config if needed)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

# Security
app.jwt.secret=${APP_JWT_SECRET:dev-only-secret-do-not-use-in-production-9a2f8c4e6b0d71f3a5b9e2c8}
app.jwt.expiration-ms=86400000

# Bean overriding
spring.main.allow-bean-definition-overriding=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.nugar=DEBUG
logging.file.path=logs
logging.file.name=logs/nugar-backend.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{requestId}] [%X{user}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{requestId}] [%X{user}] - %msg%n

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Stripe (Keys should be in environment or vault)
stripe.api.key=${STRIPE_API_KEY:}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:8081/dashboard?payment_success=true}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:8081/dashboard?payment_canceled=true}

# AWS S3 / MinIO Configuration
aws.s3.endpointUrl=${AWS_S3_ENDPOINT:http://localhost:9000}
aws.s3.accessKeyId=${AWS_ACCESS_KEY_ID:minioadmin}
aws.s3.secretAccessKey=${AWS_SECRET_ACCESS_KEY:minioadmin}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.bucketName=${AWS_S3_BUCKET:tiendario-imagenes}
aws.s3.publicUrl=${AWS_S3_PUBLIC_URL:http://localhost:9000/tiendario-imagenes/}
