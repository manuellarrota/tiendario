<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualización de Pedido</title>
</head>
<body style="font-family:'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;max-width:600px;margin:0 auto;padding:40px 20px;background-color:#f8fafc;">
    <div style="background:linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);padding:40px;border-radius:24px 24px 0 0;text-align:center;color:white;box-shadow:0 10px 25px -5px rgba(79, 70, 229, 0.4);">
        <h1 style="margin:0 0 10px;font-size:32px;font-weight:800;letter-spacing:-0.5px;"><span th:text="${emoji}">📦</span> Actualización</h1>
        <p style="opacity:0.9;margin:0;font-size:16px;font-weight:500;">Pedido #<span th:text="${orderId}">123</span></p>
    </div>
    <div style="padding:40px;background:#ffffff;border-radius:0 0 24px 24px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.05);">
        <p style="color:#1e293b;font-size:18px;margin-top:0;line-height:1.6;">Hola <strong style="color:#4f46e5;" th:text="${customerName}">Cliente</strong>,</p>
        <p style="color:#475569;font-size:16px;line-height:1.6;">Tu pedido en <strong style="color:#0f172a;" th:text="${storeName}">Tienda</strong> ha sido actualizado:</p>
        
        <div style="text-align:center;margin:30px 0;padding:30px 20px;background:#f1f5f9;border-radius:16px;border:1px solid #e2e8f0;">
            <p style="font-size:48px;margin:0 0 15px;line-height:1;" th:text="${emoji}">📦</p>
            <p style="font-size:24px;font-weight:800;margin:0;color:#4f46e5;letter-spacing:-0.5px;" th:text="${statusText}">Estado</p>
        </div>
        
        <div style="text-align:center;margin:40px 0 20px;">
            <a th:href="${orderUrl}" style="display:inline-block;background-color:#4f46e5;color:#ffffff;text-decoration:none;font-weight:700;font-size:16px;padding:16px 32px;border-radius:9999px;box-shadow:0 4px 6px -1px rgba(79, 70, 229, 0.3);transition:all 0.2s;">
                Ver Detalles en Nugar
            </a>
        </div>
        
        <hr style="border:none;border-top:1px solid #e2e8f0;margin:30px 0;"/>
        <p style="color:#94a3b8;font-size:13px;text-align:center;margin-bottom:0;">© Nugar — Marketplace Local<br>Conectando vecinos con negocios.</p>
    </div>
</body>
</html>
