<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualización de Pedido</title>
</head>
<body style="font-family:Inter,Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;background-color:#f1f5f9;">
    <div style="background:linear-gradient(135deg,#3b82f6,#6366f1);padding:40px;border-radius:16px 16px 0 0;text-align:center;color:white;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">
        <h1 style="margin:0 0 10px;font-size:28px;"><span th:text="${emoji}">📦</span> Actualización de Pedido</h1>
        <p style="opacity:0.9;margin:0;font-size:16px;">Pedido #<span th:text="${orderId}">123</span></p>
    </div>
    <div style="padding:30px;background:#ffffff;border-radius:0 0 16px 16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">
        <p style="color:#1e293b;font-size:16px;margin-top:0;">Hola <strong th:text="${customerName}">Cliente</strong>,</p>
        <p style="color:#1e293b;font-size:16px;">Tu pedido en <strong th:text="${storeName}">Tienda</strong> ha sido actualizado:</p>
        <div style="text-align:center;margin:20px 0;padding:20px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;">
            <p style="font-size:32px;margin:0 0 10px;" th:text="${emoji}">📦</p>
            <p style="font-size:20px;font-weight:800;margin:0;color:#3b82f6;" th:text="${statusText}">Estado</p>
        </div>
        <p style="color:#64748b;font-size:14px;">Puedes ver el estado de todos tus pedidos desde tu <strong>Panel de Cliente</strong>.</p>
        <hr style="border:none;border-top:1px solid #e2e8f0;margin:20px 0;"/>
        <p style="color:#94a3b8;font-size:12px;text-align:center;margin-bottom:0;">© Nugar — San Cristóbal, Táchira</p>
    </div>
</body>
</html>
