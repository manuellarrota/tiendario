<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Orden</title>
</head>
<body style="font-family:'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;max-width:600px;margin:0 auto;padding:40px 20px;background-color:#f8fafc;">
    <div style="background:linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);padding:40px;border-radius:24px 24px 0 0;text-align:center;color:white;box-shadow:0 10px 25px -5px rgba(79, 70, 229, 0.4);">
        <h1 style="margin:0 0 10px;font-size:32px;font-weight:800;letter-spacing:-0.5px;">🛒 ¡Nueva Orden!</h1>
        <p style="opacity:0.9;margin:0;font-size:16px;font-weight:500;" th:text="${storeName}">Tienda</p>
    </div>
    <div style="padding:40px;background:#ffffff;border-radius:0 0 24px 24px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.05);">
        <p style="color:#1e293b;font-size:18px;margin-top:0;line-height:1.6;">Un nuevo pedido ha llegado de <strong style="color:#4f46e5;" th:text="${customerName}">Cliente</strong>.</p>
        
        <div style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin:30px 0;">
            <h3 style="margin:0 0 15px;color:#0f172a;font-size:18px;font-weight:700;">📋 Detalle del Pedido</h3>
            <p style="white-space:pre-line;color:#475569;font-size:15px;line-height:1.6;" th:text="${orderSummary}">Detalle</p>
            <hr style="border:none;border-top:1px dashed #cbd5e1;margin:20px 0;"/>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="color:#64748b;font-weight:600;text-transform:uppercase;font-size:14px;letter-spacing:1px;">Total a Pagar</span>
                <p style="font-size:24px;font-weight:900;color:#4f46e5;margin:0;">$<span th:text="${total}">0.00</span></p>
            </div>
        </div>
        
        <div style="text-align:center;margin:40px 0 20px;">
            <a th:href="${orderUrl}" style="display:inline-block;background-color:#4f46e5;color:#ffffff;text-decoration:none;font-weight:700;font-size:16px;padding:16px 32px;border-radius:9999px;box-shadow:0 4px 6px -1px rgba(79, 70, 229, 0.3);transition:all 0.2s;">
                Ver Pedido en mi Panel
            </a>
        </div>
        
        <hr style="border:none;border-top:1px solid #e2e8f0;margin:30px 0;"/>
        <p style="color:#94a3b8;font-size:13px;text-align:center;margin-bottom:0;">© Nugar — Marketplace Local<br>Empoderando negocios locales.</p>
    </div>
</body>
</html>
