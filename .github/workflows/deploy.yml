name: Deploy Nugar to AWS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  S3_BUCKET_ADMIN: nugar-admin-frontend-prod
  S3_BUCKET_MARKET: nugar-market-frontend-prod

jobs:
  deploy-frontends:
    name: Build & Deploy Frontends
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- BUILD & DEPLOY ADMIN ---
      - name: Install & Build Admin
        run: |
          cd frontend/admin
          npm ci
          npm run build
      
      - name: Deploy Admin to S3
        run: aws s3 sync frontend/admin/dist/ s3://${{ env.S3_BUCKET_ADMIN }} --delete

      # --- BUILD & DEPLOY MARKET ---
      - name: Install & Build Market
        run: |
          cd frontend/market
          npm ci
          npm run build
      
      - name: Deploy Market to S3
        run: aws s3 sync frontend/market/dist/ s3://${{ env.S3_BUCKET_MARKET }} --delete

      # Opcional: Invalidar caché de CloudFront si ya lo tienes configurado
      # - name: Invalidate CloudFront
      #   run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"


  deploy-backend:
    name: Build & Deploy Backend (EC2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }} # ej. nugar-backend
          IMAGE_TAG: latest
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Iniciar sesion en ECR dentro del EC2
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # Descargar la nueva imagen
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
            
            # Navegar a la carpeta donde está el docker-compose.prod.yml en el servidor
            cd /home/${{ secrets.EC2_USER }}/nugar
            
            # Reiniciar el contenedor del backend
            docker-compose -f docker-compose.prod.yml stop backend
            docker-compose -f docker-compose.prod.yml rm -f backend
            docker-compose -f docker-compose.prod.yml up -d backend
            
            # Limpiar imágenes viejas para no llenar el disco del EC2
            docker image prune -f
